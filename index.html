<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dolmenwood Combat Tracker</title>
<style>
  /* Theme tokens are set at runtime from OBR.theme.getTheme(). */
  /* Fallbacks here match Owlbear's default dark palette so the UI */
  /* looks right during the brief moment before the theme loads. */
  :root {
    --or-bg: #222639;
    --or-paper: #2c3044;
    --or-paper-hover: #353a52;
    --or-border: rgba(255, 255, 255, 0.12);
    --or-text-primary: #ffffff;
    --or-text-secondary: rgba(255, 255, 255, 0.7);
    --or-text-disabled: rgba(255, 255, 255, 0.4);
    --or-primary: #bb99ff;
    --or-primary-contrast: #1a1625;
    --or-secondary: #82c8a0;
    --or-error: #f47c7c;
    --or-success: #82c8a0;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    /* Owlbear uses Roboto via MUI; fall back to the system stack. */
    font-family: "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    color: var(--or-text-primary);
    background: transparent;
    -webkit-font-smoothing: antialiased;
  }
  body {
    padding: 16px;
    min-height: 100vh;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--or-border);
  }
  .round {
    font-size: 12px;
    color: var(--or-text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .round strong {
    color: var(--or-primary);
    font-size: 18px;
    font-weight: 500;
    margin-left: 4px;
  }
  .phase-title {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.15px;
  }
  .phase-prompt {
    background: var(--or-paper);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 16px;
    line-height: 1.5;
    font-size: 13px;
    color: var(--or-text-secondary);
  }
  .join-row {
    background: var(--or-paper);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .join-row span {
    font-size: 13px;
    color: var(--or-text-secondary);
  }
  /* MUI-ish button styling. */
  button {
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    border: none;
    background: transparent;
    color: var(--or-primary);
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: background-color 0.15s;
    min-height: 32px;
  }
  button:hover:not(:disabled) {
    background: rgba(187, 153, 255, 0.08);
  }
  button:disabled {
    color: var(--or-text-disabled);
    cursor: not-allowed;
  }
  button.contained {
    background: var(--or-primary);
    color: var(--or-primary-contrast);
    padding: 8px 18px;
  }
  button.contained:hover:not(:disabled) {
    background: var(--or-primary);
    filter: brightness(1.1);
  }
  button.contained:disabled {
    background: var(--or-paper);
    color: var(--or-text-disabled);
  }
  button.outlined {
    border: 1px solid var(--or-border);
    background: transparent;
  }
  button.outlined:hover:not(:disabled) {
    border-color: var(--or-primary);
    background: rgba(187, 153, 255, 0.04);
  }
  button.danger {
    color: var(--or-error);
  }
  button.danger:hover:not(:disabled) {
    background: rgba(244, 124, 124, 0.08);
  }
  .players-section {
    margin-bottom: 14px;
  }
  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--or-text-secondary);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .player-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 6px;
    margin-bottom: 6px;
    background: var(--or-paper);
    transition: background-color 0.15s;
  }
  .player-row.self {
    background: var(--or-paper-hover);
  }
  .player-status {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    border-radius: 50%;
  }
  .player-status.ready {
    color: var(--or-primary-contrast);
    background: var(--or-success);
  }
  .player-status.waiting {
    color: var(--or-text-disabled);
    border: 1.5px solid var(--or-text-disabled);
    font-size: 10px;
  }
  .player-name {
    flex: 1;
    font-size: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .player-name .you-tag {
    color: var(--or-text-secondary);
    font-size: 11px;
    margin-left: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .self-ready-btn {
    padding: 4px 12px;
    font-size: 12px;
    min-height: 28px;
  }
  .footer {
    margin-top: 20px;
    padding-top: 14px;
    border-top: 1px solid var(--or-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .empty-state {
    padding: 16px;
    color: var(--or-text-secondary);
    font-size: 13px;
    font-style: italic;
    text-align: center;
    background: var(--or-paper);
    border-radius: 6px;
  }
  .loading {
    padding: 40px;
    text-align: center;
    color: var(--or-text-secondary);
  }
  .status-hint {
    text-align: center;
    font-size: 12px;
    color: var(--or-text-secondary);
    margin-top: 10px;
    font-style: italic;
  }
</style>
</head>
<body>
<div id="app" class="loading">Connecting to Owlbear Rodeo…</div>

<script type="module">
import OBR from "https://esm.sh/@owlbear-rodeo/sdk@3";

const EXT_ID = "com.dolmenwood.combat-tracker";
const METADATA_KEY = `${EXT_ID}/state`;

// Dolmenwood combat phase sequence.
const PHASES = [
  {
    id: "declarations",
    name: "Declarations",
    prompt: "Each player must declare intent to cast a spell, use a fairy rune, or flee from melee. Other actions need not be declared. Press Ready when your declaration is made.",
  },
  {
    id: "initiative",
    name: "Initiative",
    prompt: "One player rolls 1d6 for the party. The Referee rolls 1d6 for each other side. Highest acts first. Press Ready once the roll is made and initiative is known.",
  },
  {
    id: "movement",
    name: "Movement",
    prompt: "Combatants on the acting side may move up to half Speed (full Speed if fleeing melee, forfeiting their attack). No movement while casting a spell. Press Ready once your movement is resolved.",
  },
  {
    id: "missile",
    name: "Missile Attacks",
    prompt: "Ranged attacks — fired or thrown weapons. Possible when opponents are more than 5 feet apart. Press Ready once your ranged attack (or lack thereof) is resolved.",
  },
  {
    id: "magic",
    name: "Magic",
    prompt: "Spells, fairy runes, glamours, magic items, and turning the undead are resolved now. Only combatants who declared a spell in the Declarations phase may cast. Press Ready when magic is resolved.",
  },
  {
    id: "melee",
    name: "Melee Attacks",
    prompt: "Melee attacks and any other remaining actions. Possible when opponents are 5 feet or less apart. Press Ready when your melee (or other action) is resolved.",
  },
  {
    id: "morale",
    name: "Morale",
    prompt: "The Referee makes a Morale check for monsters and NPCs, if applicable. Press Ready once the check has been rolled and its outcome applied.",
  },
];

function makeInitialState() {
  return {
    round: 1,
    phaseIndex: 0,
    players: {},
  };
}

// ---- Theme integration -----------------------------------------------------

// Map Owlbear's theme object to our CSS custom properties.
// The theme shape from OBR.theme.getTheme() follows MUI's palette structure:
// { mode, background: {paper, default}, primary: {main, contrastText}, text: {primary, secondary, disabled}, ... }
function applyTheme(theme) {
  if (!theme) return;
  const root = document.documentElement;
  const p = theme.primary || {};
  const s = theme.secondary || {};
  const bg = theme.background || {};
  const t = theme.text || {};

  if (bg.default) root.style.setProperty("--or-bg", bg.default);
  if (bg.paper) {
    root.style.setProperty("--or-paper", bg.paper);
    // Derive a hover shade by mixing paper toward text color slightly.
    root.style.setProperty("--or-paper-hover", `color-mix(in srgb, ${bg.paper} 88%, ${t.primary || "#fff"})`);
  }
  if (p.main) root.style.setProperty("--or-primary", p.main);
  if (p.contrastText) root.style.setProperty("--or-primary-contrast", p.contrastText);
  if (s.main) root.style.setProperty("--or-secondary", s.main);
  if (t.primary) root.style.setProperty("--or-text-primary", t.primary);
  if (t.secondary) root.style.setProperty("--or-text-secondary", t.secondary);
  if (t.disabled) root.style.setProperty("--or-text-disabled", t.disabled);
  // Border alpha matches MUI convention (dark 0.12 over light, vice versa).
  const borderRgba = theme.mode === "LIGHT"
    ? "rgba(0, 0, 0, 0.12)"
    : "rgba(255, 255, 255, 0.12)";
  root.style.setProperty("--or-border", borderRgba);

  // color-scheme ensures scrollbars and form controls match the theme mode.
  root.style.setProperty("color-scheme", theme.mode === "LIGHT" ? "light" : "dark");
}

// ---- State helpers ---------------------------------------------------------

async function readState() {
  const meta = await OBR.room.getMetadata();
  const existing = meta[METADATA_KEY];
  if (existing && typeof existing === "object") {
    return existing;
  }
  return makeInitialState();
}

async function writeState(state) {
  await OBR.room.setMetadata({ [METADATA_KEY]: state });
}

async function updateState(mutator) {
  const current = await readState();
  const next = mutator(structuredClone(current));
  await writeState(next);
}

// ---- Globals ---------------------------------------------------------------

let selfId = null;
let selfName = null;
let selfRole = null;
let connectedPlayerIds = new Set();
// Guards against the same client issuing an auto-advance twice for one phase.
let lastAutoAdvancedAt = null; // `${round}:${phaseIndex}` string

// ---- Rendering -------------------------------------------------------------

function render(state) {
  const app = document.getElementById("app");
  app.classList.remove("loading");

  const phase = PHASES[state.phaseIndex];
  const self = state.players[selfId];
  const isJoined = !!self?.joined;

  const activePlayers = Object.entries(state.players)
    .filter(([id, p]) => p.joined && connectedPlayerIds.has(id))
    .map(([id, p]) => ({ id, ...p }))
    // Self first, then alphabetical — stable ordering across clients.
    .sort((a, b) => {
      if (a.id === selfId) return -1;
      if (b.id === selfId) return 1;
      return a.name.localeCompare(b.name);
    });

  const allReady = activePlayers.length > 0 &&
    activePlayers.every((p) => p.readyPhases?.[phase.id]);

  const readyCount = activePlayers.filter((p) => p.readyPhases?.[phase.id]).length;

  // --- Auto-advance election -----------------------------------------------
  // When everyone's ready, one client fires the advance. The elected client
  // is the one with the lexicographically smallest ID among active joined
  // players. This prevents races where multiple clients simultaneously try
  // to advance and the round bumps by more than 1.
  if (allReady && activePlayers.length > 0) {
    const electedId = [...activePlayers.map(p => p.id)].sort()[0];
    const phaseKey = `${state.round}:${state.phaseIndex}`;
    if (electedId === selfId && lastAutoAdvancedAt !== phaseKey) {
      lastAutoAdvancedAt = phaseKey;
      // Fire-and-forget; the resulting metadata change triggers a re-render.
      handleAdvance();
    }
  }

  app.innerHTML = `
    <div class="header">
      <div class="phase-title">${escapeHtml(phase.name)}</div>
      <div class="round">Round<strong>${state.round}</strong></div>
    </div>

    <div class="phase-prompt">
      ${escapeHtml(phase.prompt)}
    </div>

    ${!isJoined ? `
      <div class="join-row">
        <span>You are not in the combat.</span>
        <button id="toggle-join" class="outlined">Join combat</button>
      </div>
    ` : ""}

    <div class="players-section">
      <div class="section-label">Combatants — ${readyCount} of ${activePlayers.length} ready</div>
      ${activePlayers.length === 0
        ? `<div class="empty-state">No players have joined yet.</div>`
        : activePlayers.map((p) => renderPlayerRow(p, phase.id)).join("")
      }
      ${activePlayers.length > 0
        ? `<div class="status-hint">${
            allReady
              ? "Advancing to next phase…"
              : "Phase advances automatically when everyone is ready."
          }</div>`
        : ""
      }
    </div>

    <div class="footer">
      ${isJoined
        ? `<button id="toggle-join" class="outlined">Leave combat</button>`
        : `<span></span>`
      }
      <button id="reset-btn" class="danger">Reset Combat</button>
    </div>
  `;

  const joinBtn = document.getElementById("toggle-join");
  if (joinBtn) joinBtn.addEventListener("click", handleToggleJoin);
  document.getElementById("reset-btn").addEventListener("click", handleReset);

  for (const p of activePlayers) {
    const btn = document.getElementById(`ready-${p.id}`);
    if (btn && p.id === selfId) {
      btn.addEventListener("click", handleToggleReady);
    }
  }
}

function renderPlayerRow(player, phaseId) {
  const ready = !!player.readyPhases?.[phaseId];
  const isSelf = player.id === selfId;
  const statusIcon = ready ? "✓" : "";
  const statusClass = ready ? "ready" : "waiting";

  return `
    <div class="player-row ${isSelf ? "self" : ""}">
      <div class="player-status ${statusClass}">${statusIcon}</div>
      <div class="player-name">
        ${escapeHtml(player.name)}
        ${isSelf ? '<span class="you-tag">you</span>' : ""}
      </div>
      ${isSelf
        ? `<button id="ready-${player.id}" class="self-ready-btn ${ready ? "outlined" : "contained"}">
            ${ready ? "Not ready" : "Ready"}
          </button>`
        : ""
      }
    </div>
  `;
}

// ---- Event handlers --------------------------------------------------------

async function handleToggleJoin() {
  await updateState((state) => {
    const existing = state.players[selfId];
    if (existing?.joined) {
      existing.joined = false;
      existing.readyPhases = {};
    } else {
      state.players[selfId] = {
        name: selfName,
        joined: true,
        readyPhases: {},
      };
    }
    return state;
  });
}

async function handleToggleReady() {
  await updateState((state) => {
    const phase = PHASES[state.phaseIndex];
    const player = state.players[selfId];
    if (!player || !player.joined) return state;
    player.readyPhases = player.readyPhases || {};
    player.readyPhases[phase.id] = !player.readyPhases[phase.id];
    return state;
  });
}

async function handleAdvance() {
  await updateState((state) => {
    if (state.phaseIndex < PHASES.length - 1) {
      state.phaseIndex += 1;
    } else {
      state.round += 1;
      state.phaseIndex = 0;
      for (const p of Object.values(state.players)) {
        p.readyPhases = {};
      }
    }
    return state;
  });
}

async function handleReset() {
  const confirmed = confirm("Reset combat to Round 1, Declarations phase? This clears all ready states.");
  if (!confirmed) return;
  lastAutoAdvancedAt = null;
  await updateState((state) => {
    state.round = 1;
    state.phaseIndex = 0;
    for (const p of Object.values(state.players)) {
      p.readyPhases = {};
    }
    return state;
  });
}

// ---- Utilities -------------------------------------------------------------

function escapeHtml(str) {
  if (str == null) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

// ---- Boot ------------------------------------------------------------------

OBR.onReady(async () => {
  selfId = await OBR.player.getId();
  selfName = await OBR.player.getName();
  selfRole = await OBR.player.getRole();

  // Apply Owlbear's theme immediately, then subscribe to changes.
  try {
    const theme = await OBR.theme.getTheme();
    applyTheme(theme);
  } catch (e) {
    // Non-fatal — fallback CSS values approximate Owlbear's dark theme.
    console.warn("Could not fetch Owlbear theme:", e);
  }
  OBR.theme.onChange(applyTheme);

  const party = await OBR.party.getPlayers();
  connectedPlayerIds = new Set([selfId, ...party.map((p) => p.id)]);

  OBR.room.onMetadataChange((metadata) => {
    const state = metadata[METADATA_KEY] || makeInitialState();
    render(state);
  });

  OBR.party.onChange((players) => {
    connectedPlayerIds = new Set([selfId, ...players.map((p) => p.id)]);
    readState().then(render);
  });

  OBR.player.onChange(async (player) => {
    if (player.name !== selfName) {
      selfName = player.name;
      await updateState((state) => {
        if (state.players[selfId]) {
          state.players[selfId].name = selfName;
        }
        return state;
      });
    }
  });

  const state = await readState();
  render(state);
});
</script>
</body>
</html>
